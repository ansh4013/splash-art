<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash Art Gallery</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h1>🎨 Splash Art</h1>
      </div>
      <ul class="nav-links">
        <li><a href="/">Gallery</a></li>
        <li><a href="/admin">Admin Portal</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to Splash Art Gallery</h1>
      <p>Discover beautiful artwork from talented artists</p>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="gallery-section">
    <div class="container">
      <h2>Our Collection</h2>
      <div class="gallery-grid" id="galleryGrid">
        <!-- Artworks loaded here by JavaScript -->
      </div>
      <div id="loading" class="loading">Loading artworks...</div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Splash Art Gallery. All rights reserved.</p>
  </footer>

  <script src="/js/gallery.js"></script>
</body>
</html>
